<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 650" width="560" height="650">
  <defs>
    <marker id="arr" markerWidth="8" markerHeight="6" refX="7" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#546e7a"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="560" height="650" fill="#f8f9fa" rx="12"/>

  <!-- Section: YOUR SERVER -->
  <rect x="16" y="16" width="528" height="374" rx="8" fill="none" stroke="#90a4ae" stroke-width="1" stroke-dasharray="5,4"/>
  <text x="30" y="31" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#90a4ae" font-weight="600" letter-spacing="0.5">YOUR SERVER — Plesk + BIND</text>

  <!-- Row 1: Plesk Event Manager -->
  <rect x="100" y="42" width="360" height="64" rx="8" fill="#e3f2fd" stroke="#1565c0" stroke-width="1.5"/>
  <text x="280" y="64" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="700" fill="#0d47a1">Plesk Event Manager</text>
  <text x="280" y="82" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#1565c0">12 events: domain/site/alias &#x00D7; create / delete / update</text>
  <text x="280" y="98" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#5c83b3">domain_create &#x00B7; site_create &#x00B7; domain_alias_create &#x00B7; domain_delete &#x00B7; domain_update &#x00B7; &#x2026;</text>

  <!-- Arrow 1 -->
  <line x1="280" y1="106" x2="280" y2="124" stroke="#546e7a" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="286" y="119" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#78909c">fires handler</text>

  <!-- Row 2: Event handler script -->
  <rect x="100" y="126" width="360" height="64" rx="8" fill="#e3f2fd" stroke="#1565c0" stroke-width="1.5"/>
  <text x="280" y="148" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="700" fill="#0d47a1">Event Handler Script</text>
  <text x="280" y="166" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#1565c0">seconddns-plesk-domain_create.sh</text>
  <text x="280" y="182" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#5c83b3">domain_delete.sh &#x00B7; domain_rename.sh (old zone removed, new zone added)</text>

  <!-- Arrow 2 -->
  <line x1="280" y1="190" x2="280" y2="208" stroke="#546e7a" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Row 3: IDN Punycode conversion -->
  <rect x="100" y="210" width="360" height="52" rx="8" fill="#e3f2fd" stroke="#1565c0" stroke-width="1.5"/>
  <text x="280" y="232" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="700" fill="#0d47a1">IDN: Punycode Conversion</text>
  <text x="280" y="250" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#1565c0">münchen.de &#x2192; xn--mnchen-3ya.de (via idn2)</text>

  <!-- Arrow 3 -->
  <line x1="280" y1="262" x2="280" y2="280" stroke="#546e7a" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="286" y="275" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#78909c">HTTPS</text>

  <!-- Row 4: API call -->
  <rect x="100" y="282" width="360" height="52" rx="8" fill="#e8f5e9" stroke="#388e3c" stroke-width="1.5"/>
  <text x="280" y="304" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="700" fill="#1b5e20">SecondDNS API</text>
  <text x="280" y="322" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#2e7d32">POST /api/zones (create) &#x00B7; DELETE /api/zones/{id} (delete)</text>

  <!-- Section: SECONDDNS -->
  <rect x="16" y="408" width="528" height="222" rx="8" fill="none" stroke="#ffb74d" stroke-width="1" stroke-dasharray="5,4"/>
  <text x="30" y="423" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#ffb74d" font-weight="600" letter-spacing="0.5">SECONDDNS</text>

  <!-- Arrow 4→5 crosses section boundary -->
  <line x1="280" y1="334" x2="280" y2="428" stroke="#546e7a" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- Row 5: Zone registered -->
  <rect x="100" y="430" width="360" height="52" rx="8" fill="#fff8e1" stroke="#f57c00" stroke-width="1.5"/>
  <text x="280" y="452" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="700" fill="#e65100">Zone Registered / Removed</text>
  <text x="280" y="470" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#bf360c">Slave zone created or deleted on SecondDNS</text>

  <!-- Arrow 5 -->
  <line x1="280" y1="482" x2="280" y2="500" stroke="#546e7a" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="286" y="495" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#78909c">TCP 53</text>

  <!-- Row 6: AXFR -->
  <rect x="100" y="502" width="360" height="52" rx="8" fill="#fff8e1" stroke="#f57c00" stroke-width="1.5"/>
  <text x="280" y="524" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="700" fill="#e65100">AXFR Zone Transfer</text>
  <text x="280" y="542" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#bf360c">Plesk BIND (MASTER) &#x2192; SecondDNS secondary</text>

  <!-- Arrow 6 -->
  <line x1="280" y1="554" x2="280" y2="572" stroke="#546e7a" stroke-width="1.5" marker-end="url(#arr)"/>
  <text x="286" y="567" font-family="system-ui,-apple-system,sans-serif" font-size="10" fill="#78909c">NOTIFY</text>

  <!-- Row 7: Active -->
  <rect x="100" y="574" width="360" height="52" rx="8" fill="#e8f5e9" stroke="#388e3c" stroke-width="1.5"/>
  <text x="280" y="596" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="13" font-weight="700" fill="#1b5e20">Zone Active on Secondary</text>
  <text x="280" y="614" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#2e7d32">Subsequent changes propagate instantly via BIND NOTIFY</text>

  <!-- Bottom note -->
  <text x="280" y="642" text-anchor="middle" font-family="system-ui,-apple-system,sans-serif" font-size="11" fill="#90a4ae">Rename event: delete old zone + register new zone in one handler call</text>
</svg>
